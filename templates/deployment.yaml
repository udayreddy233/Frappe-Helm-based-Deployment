apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frappe.deploymentName" . }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "frappe.appName" . }}
  template:
    metadata:
      labels:
        app: {{ include "frappe.appName" . }}
      annotations:
        {{ if .Values.siteConfig.enabled }}
        checksum/site-config: {{ .Values.siteConfig.values | toJson | sha256sum | quote }}
        {{ end }}
    spec:
      nodeName: {{ .Values.nodeName }}
      restartPolicy: Always
      securityContext:
        fsGroup: 1000

      initContainers:
        - name: init-sites
          image: {{ include "frappe.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: REDIS_CACHE
              value: {{ .Values.redis.cache | quote }}

            {{ if .Values.siteConfig.enabled }}
            - name: SITE_CONFIG_VALUES_JSON
              valueFrom:
                secretKeyRef:
                  name: {{ include "frappe.appName" . }}-site-config
                  key: site_config_values.json
            {{ end }}

          command:
            - sh
            - -c
            - |
              set -e

              SITE_NAME="{{ .Values.site.name }}"
              IMAGE_SITES="/home/frappe/frappe-bench/sites"
              PVC_SITES="/sites-pvc"

              # Always sync assets from image.
              # This prevents asset hash mismatch after new image deployment.
              mkdir -p ${PVC_SITES}/assets
              rsync -a --delete \
                ${IMAGE_SITES}/assets/ \
                ${PVC_SITES}/assets/

              # Only copy full sites folder during first deployment.
              # Existing site data in PVC should not be overwritten.
              if [ ! -d "${PVC_SITES}/${SITE_NAME}" ]; then
                rsync -a --exclude='assets' \
                  ${IMAGE_SITES}/ \
                  ${PVC_SITES}/
              fi

              {{ if .Values.siteConfig.enabled }}
              # Dynamically merge values.yaml siteConfig.values into site_config.json.
              # This works for GIS/Superset today and any other keys in future deployments.
              export SITE_NAME
              export PVC_SITES
              export SITE_CONFIG_VALUES_JSON

              cat > /tmp/update_site_config.py <<'PY'
              import json
              import os
              from pathlib import Path

              site_config = Path(os.environ["PVC_SITES"]) / os.environ["SITE_NAME"] / "site_config.json"

              if not site_config.exists():
                  raise SystemExit(f"site_config.json not found: {site_config}")

              updates = json.loads(os.environ.get("SITE_CONFIG_VALUES_JSON", "{}"))

              if not isinstance(updates, dict):
                  raise SystemExit("siteConfig.values must be a dictionary/map")

              data = json.loads(site_config.read_text())

              for key, value in updates.items():
                  data[key] = value

              site_config.write_text(json.dumps(data, indent=1) + "\n")

              print(f"Updated {len(updates)} site_config keys in {site_config}")
              PY

              python /tmp/update_site_config.py
              {{ end }}

              redis-cli -u ${REDIS_CACHE} FLUSHALL || true

          volumeMounts:
            - name: sites
              mountPath: /sites-pvc

      containers:
        - name: backend
          image: {{ include "frappe.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          command:
            [
              "env",
              "PYTHONPATH=/home/frappe/frappe-bench/apps",
              "/home/frappe/frappe-bench/env/bin/gunicorn",
              "--chdir=/home/frappe/frappe-bench/sites",
              "--bind=0.0.0.0:8000",
              "--threads=4",
              "--workers=5",
              "--worker-class=gthread",
              "--worker-tmp-dir=/dev/shm",
              "--timeout=120",
              "--preload",
              "frappe.app:application"
            ]
          ports:
            - containerPort: 8000
          resources: {{- toYaml .Values.resources.backend | nindent 12 }}
          volumeMounts:
            - name: sites
              mountPath: /home/frappe/frappe-bench/sites

        - name: websocket
          image: {{ include "frappe.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
          ports:
            - containerPort: 9000
          resources: {{- toYaml .Values.resources.websocket | nindent 12 }}
          volumeMounts:
            - name: sites
              mountPath: /home/frappe/frappe-bench/sites

        - name: worker-long
          image: {{ include "frappe.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          command: ["bench", "worker", "--queue", "long,default,short"]
          resources: {{- toYaml .Values.resources.workerLong | nindent 12 }}
          volumeMounts:
            - name: sites
              mountPath: /home/frappe/frappe-bench/sites

        - name: worker-short
          image: {{ include "frappe.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          command: ["bench", "worker", "--queue", "short,default"]
          resources: {{- toYaml .Values.resources.workerShort | nindent 12 }}
          volumeMounts:
            - name: sites
              mountPath: /home/frappe/frappe-bench/sites

        - name: scheduler
          image: {{ include "frappe.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          command: ["bench", "schedule"]
          resources: {{- toYaml .Values.resources.scheduler | nindent 12 }}
          volumeMounts:
            - name: sites
              mountPath: /home/frappe/frappe-bench/sites

        - name: frontend
          image: {{ include "frappe.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          securityContext:
            runAsUser: 0
          env:
            - name: BACKEND
              value: "127.0.0.1:8000"
            - name: SOCKETIO
              value: "127.0.0.1:9000"
            - name: FRAPPE_SITE_NAME_HEADER
              value: {{ .Values.site.name | quote }}
          ports:
            - containerPort: 8080
          command: ["/usr/local/bin/nginx-entrypoint.sh"]
          resources: {{- toYaml .Values.resources.frontend | nindent 12 }}
          volumeMounts:
            - name: sites
              mountPath: /home/frappe/frappe-bench/sites

      volumes:
        - name: sites
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.claimName }}
