apiVersion: v1
kind: Service
metadata:
  name: {{ include "frappe.serviceName" . }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ include "frappe.appName" . }}
  ports:
    - name: frontend
      port: 8080
      targetPort: 8080
    - name: backend
      port: 8000
      targetPort: 8000
    - name: websocket
      port: 9000
      targetPort: 9000
  type: ClusterIP
